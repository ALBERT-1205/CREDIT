<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>財務槓桿試算器整合版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: #f1f5f9;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 上方頁籤列 */
        .tab-bar {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0f172a;
            padding: 10px 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            overflow-x: auto;
        }
        .tab-bar .brand {
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            margin-right: 12px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab-bar .brand .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
        }
        .tab-btn {
            appearance: none;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            padding: 9px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #cbd5e1;
            background: transparent;
            transition: all 0.2s ease;
        }
        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .tab-btn.active {
            background: #fff;
            color: #1e293b;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        /* 內容區 */
        .tab-content {
            flex: 1;
            position: relative;
        }
        .tab-panel {
            display: none;
            width: 100%;
            height: 100%;
        }
        .tab-panel.active {
            display: block;
        }
        .tab-panel iframe {
            display: block;
            width: 100%;
            height: calc(100vh - 56px);
            border: none;
        }
    </style>
</head>
<body>
    <!-- 最上方的行條（頁籤）選取 -->
    <div class="tab-bar">
        <div class="brand"><span class="dot"></span>財務槓桿試算器</div>
        <button class="tab-btn active" data-target="panel-a">借力使力：信貸套利</button>
        <button class="tab-btn" data-target="panel-b">房產活化 × 質押套利</button>
    </div>

    <div class="tab-content">
        <div class="tab-panel active" id="panel-a">
            <iframe src="a.html" title="信貸套利與基金配置試算器" loading="lazy"></iframe>
        </div>
        <div class="tab-panel" id="panel-b">
            <iframe src="b.html" title="房產活化 × 質押套利試算器" loading="lazy"></iframe>
        </div>
    </div>

    <script>
        const tabButtons = document.querySelectorAll('.tab-btn');
        const panels = document.querySelectorAll('.tab-panel');

        tabButtons.forEach((btn) => {
            btn.addEventListener('click', () => {
                tabButtons.forEach((b) => b.classList.remove('active'));
                panels.forEach((p) => p.classList.remove('active'));

                btn.classList.add('active');
                document.getElementById(btn.dataset.target).classList.add('active');
            });
        });
    </script>
</body>
</html>
